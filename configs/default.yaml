# Shared defaults. A profile (local.yaml / api.yaml) is layered on top of this,
# then environment variables (secrets, service URLs) override both.
# Deep-merged in this order:  default.yaml < <profile>.yaml < env vars

app:
  name: agentic-graph-rag
  log_level: INFO
  # Namespace so multiple corpora can share one Neo4j instance.
  corpus: default

# --- Reply LLM (the agent) ----------------------------------------------------
# GRAPHRAG_LLM="provider:model" in the environment overrides provider/model
# below (and clears `extra`) — the one-line local <-> API toggle. Embeddings,
# OCR and rerank are NOT affected by it; they follow the profile.
llm:
  # ollama | anthropic | openai | gemini | deepseek | qwen
  # deepseek and qwen are OpenAI-compatible endpoints (api.deepseek.com,
  # DashScope compatible-mode); they need DEEPSEEK_API_KEY / DASHSCOPE_API_KEY.
  provider: ollama
  model: qwen2.5:7b-instruct
  temperature: 0.1
  max_tokens: 2048
  # Extra provider kwargs pass straight through to the LangChain chat model.
  # Applied to this model only — a per-request model override doesn't inherit
  # them, since they're model-specific (e.g. Anthropic thinking).
  extra: {}
  # Models the chat UI may select per request. Empty -> the model above is the
  # only choice. A request naming anything not on this list silently falls back
  # to the default, so a stale UI selection can't reach an arbitrary provider.
  allowed: []
  #  - { provider: gemini, model: gemini-3.5-flash, label: "Gemini 3.5 Flash", default: true }
  #  - { provider: qwen,   model: qwen3.6-flash,    label: "Qwen 3.6 Flash" }

# --- Embeddings (rich control — see docs/CONFIGURATION.md) ---------------------
embeddings:
  # sentence_transformers | ollama | openai | gemini | voyage | cohere
  # `sentence_transformers` runs the model in-process for full control over every
  # knob below; it needs the `local-models` extra (it pulls torch, ~3.9 GB). Both
  # shipped profiles override this — `local` uses ollama, `api` uses voyage.
  provider: sentence_transformers
  model: BAAI/bge-m3
  tokenizer: null             # HF tokenizer for chunk sizing; defaults to `model`.
                              # Set it when `model` isn't an HF repo id (e.g. the
                              # Ollama tag `bge-m3:latest` -> BAAI/bge-m3).
  dimensions: null            # truncate output dim if the model supports it (Matryoshka)
  device: auto                # auto | cpu | cuda | mps
  batch_size: 32
  normalize: true
  max_seq_length: 512
  query_prefix: ""            # e.g. "query: " for e5-style models
  document_prefix: ""
                              # note: max_seq_length/device are server-side
                              # decisions under `ollama` and are ignored there
  cache:
    enabled: true             # cache vectors in Redis, keyed by (model, text)
    ttl_seconds: 604800

# --- Chunking (tokenizer taken from the embedder) -----------------------------
chunking:
  strategy: recursive         # recursive | token | semantic
  max_tokens: 384
  overlap: 64
  semantic:
    threshold: 0.75           # cosine-distance boundary for semantic splitting
    min_chunk_tokens: 96

# --- OCR (images / scanned PDFs -> text -> embeddings) ------------------------
ocr:
  enabled: true
  engine: vision_llm          # vision_llm | tesseract
  # Scanned pages often carry a thin text layer (a page number, a scanner
  # header), so "extracted some text" != "read the page". Pages with a shorter
  # text layer than this get OCR'd. 0 = only OCR pages that extract nothing,
  # which silently misses any scan bearing a page label.
  min_text_chars: 100
  vision_llm:
    provider: ollama          # ollama (gemma3) | gemini
    # gemma3:4b, NOT gemma4 — gemma4:e4b advertises `vision` in `ollama show`
    # and then ignores attached images, which OCR cannot tell from a blank page.
    # Swap to gemini-2.5-flash when provider=gemini.
    model: gemma3:4b
    prompt: "Transcribe all text in this image exactly, preserving structure. Output only the text."
  tesseract:
    lang: eng

# --- Storage (Neo4j default; adapter-based, swappable) ------------------------
storage:
  graph:
    provider: neo4j
    database: neo4j
  vector:
    provider: neo4j           # neo4j:  vectors on :Chunk nodes, native ANN index
                              # local:  exact numpy search over files in local_dir
                              #         (no service; fine to ~100k chunks/corpus)
                              # duckdb: one embedded DB file per user under
                              #         duckdb_dir — real per-user isolation,
                              #         exact cosine scan. Single-process only:
                              #         the API must own the files (no separate
                              #         ingest worker), see docs/DEPLOYMENT.md.
    index_name: chunk_embeddings
    similarity: cosine
    local_dir: data/vectors   # only used by provider: local
    duckdb_dir: data/vectors  # only used by provider: duckdb
    memory_limit_mb: 256      # DuckDB per-connection memory cap

# --- Retrieval ----------------------------------------------------------------
retrieval:
  top_k: 8                    # final chunks handed to the LLM
  candidate_k: 24            # candidates fetched before reranking
  graph_hops: 2               # neighborhood depth for graph-augmented retrieval
  rerank:
    enabled: true
    # cross_encoder            local HF model, one batched pass (needs the
    #                          `local-models` extra — pulls torch, ~3.9 GB)
    # ollama|anthropic|openai|gemini   a chat model scores each candidate (see below)
    # cohere|voyage            hosted rerank endpoints
    # none                     skip reranking
    provider: cross_encoder
    model: BAAI/bge-reranker-v2-m3
    # --- generative rerank only (ignored by cross_encoder / cohere / voyage) ---
    concurrency: 4            # parallel scoring calls; one call per candidate
    max_tokens: 16            # enough for a bare number; raise if you enable reasoning
    prompt: |-
      Rate how well the document answers the query, from 0 to 10.
      Reply with only the number.

      Query: {query}

      Document: {document}
    extra: {}                 # provider kwargs; ollama defaults to reasoning: false

# --- Agent --------------------------------------------------------------------
agent:
  memory: true                # multi-turn memory (durable checkpointer)
  memory_backend: redis       # redis    needs redis-stack (RediSearch modules)
                              # postgres needs GRAPHRAG_DATABASE_URL; lets plain
                              #          redis:7 serve cache/queue/limits
                              # Either way, an unreachable backend degrades to
                              # in-process memory rather than failing requests.
  max_tool_iterations: 6
  default_style: detailed     # concise | detailed | technical | eli5

# --- Ingestion ----------------------------------------------------------------
ingestion:
  extract_graph: true         # run LLM entity/relation extraction into the KG
                              # false -> vector-only RAG, dramatically faster ingest
  max_concurrency: 4          # parallel extraction LLM calls per document
  # llm:                      # optional: dedicated extraction model (defaults to `llm`)
  #   provider: ollama        # extraction sees one chunk at a time, so it needs far
  #   model: gemma3:4b        # less context than chat — and on a small GPU, context
  #   extra: {num_ctx: 4096}  # size is what decides whether it fits in VRAM
  resolve_entities:
    enabled: true             # merge "Acme" / "Acme Robotics" style duplicates
    similarity: 0.93          # name-embedding cosine needed for a merge
  communities:
    enabled: true             # cluster the graph + LLM-summarize each cluster;
                              # powers the agent's `global_search` tool
    max_communities: 12       # summarize at most this many (largest first)
    min_size: 3               # ignore clusters smaller than this

# --- Auth ---------------------------------------------------------------------
auth:
  enabled: false              # true: require an API key (Authorization: Bearer)
                              #       the verified key sets the user; X-User-Id ignored
                              # set GRAPHRAG_ADMIN_KEY in .env to gate user creation

# --- Multi-user ---------------------------------------------------------------
tenancy:
  enabled: true
  default_user: default
  per_tenant_database: false  # false: isolate by corpus (Community); true: DB per user (Enterprise)
  database_prefix: u_
  max_active_tenants: 256     # bound the per-user cache (heavy models stay shared)

# --- Guardrails safety layer (integrated feature — integrations/guardrails) ---
# Off by default: the base system is unchanged until you turn this on. When
# enabled, every /query and /compare is screened by the standalone guardrails
# service — the user's message before the model runs, the answer after (PII
# redaction, groundedness, system-prompt leak). See docs/INTEGRATIONS.md.
safety:
  enabled: false
  base_url: http://localhost:8080   # override per-env with GRAPHRAG_GUARDRAILS_URL
  policy_id: default                # a policies/*.yaml id on the guardrails server
  check_input: true                 # screen the user message before the model
  check_output: true                # screen the answer (redact / block / groundedness)
  fail_open: true                   # guard unreachable -> allow (true) or block (false)
  timeout_s: 5.0

# --- llmlens observability (integrated feature — integrations/llmlens) --------
# Off by default. When enabled, the agent's LangChain/LangGraph runs are traced
# to the standalone llmlens server: prompts, latency, tokens, cost-per-user,
# tool calls, errors. url/key also read from LLMLENS_URL / LLMLENS_API_KEY.
observability:
  enabled: false
  url: http://localhost:8100        # llmlens ingest API (remap off :8000 locally)
  service: agentic-graph-rag

# --- API ----------------------------------------------------------------------
api:
  cors_origins: ["http://localhost:5173"]
  cors_methods: ["GET", "POST", "OPTIONS"]
  cors_headers: ["Content-Type", "X-User-Id", "Authorization"]
  stream: true
  rate_limit: "60/minute"     # per user; falls back to client IP
  max_upload_mb: 25           # reject larger uploads. Raising this alone isn't
                              # enough: MAX_UPLOAD_MB in .env must be >= it, or
                              # the frontend's nginx 413s the upload first.
  max_files_per_user: 10      # cap on uploaded files per user
