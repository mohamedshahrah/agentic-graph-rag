# One command brings up the whole system:  docker compose up -d
#
# Services:
#   neo4j     graph + vector store        http://localhost:7474
#   redis     memory / cache / queue
#   api       FastAPI service             http://localhost:8000  (docs at /docs)
#   worker    ingest queue worker (Arq)   — heavy work runs here, off the API
#   frontend  React chat UI               http://localhost:5173
#   ollama    local models (opt-in)       profile: local
#
# RAM / CPU per service are capped via .env (see the *_MEM_LIMIT / *_CPU_LIMIT
# knobs). Tune them for your machine. Fully local? add `--profile local`.

name: agentic-graph-rag

services:
  neo4j:
    image: neo4j:5.23
    # Come back after a Docker Desktop / host restart. `unless-stopped` (not
    # `always`) so an explicit `docker compose stop|down` stays stopped.
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${GRAPHRAG_NEO4J_PASSWORD:-12345678}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      # Bound Neo4j's memory so it can't starve the host.
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP:-1G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512M}
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j_data:/data"]
    deploy:
      resources:
        limits: { cpus: "${NEO4J_CPU_LIMIT:-1.5}", memory: "${NEO4J_MEM_LIMIT:-2g}" }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    # redis-stack-server, NOT plain redis: the LangGraph Redis checkpointer that
    # backs durable agent memory needs the RediSearch/RedisJSON modules — it
    # issues FT.* commands. Vanilla redis answers "unknown command 'FT._LIST'"
    # and memory silently falls back to in-process. (This mismatch is also what
    # writes an RDB a plain `redis:7-alpine` then can't reload — the modules'
    # newer core bumps the RDB version.)
    image: redis/redis-stack-server:7.4.0-v3
    restart: unless-stopped
    # maxmemory via REDIS_ARGS, not a `command:` override — overriding the
    # command bypasses the entrypoint that loads the modules.
    environment:
      REDIS_ARGS: "--maxmemory ${REDIS_MAXMEMORY:-384mb} --maxmemory-policy allkeys-lru"
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    deploy:
      resources:
        limits: { cpus: "${REDIS_CPU_LIMIT:-0.5}", memory: "${REDIS_MEM_LIMIT:-512m}" }
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build: { context: ., dockerfile: docker/Dockerfile }
    restart: unless-stopped
    env_file: [.env]
    environment: &backend_env
      GRAPHRAG_PROFILE: ${GRAPHRAG_PROFILE:-local}
      GRAPHRAG_NEO4J_URI: bolt://neo4j:7687
      GRAPHRAG_REDIS_URL: redis://redis:6379/0
      # Defaults to the Ollama on the *host* (reusing models you've pulled).
      # Running the bundled service instead? set
      # GRAPHRAG_OLLAMA_BASE_URL_INTERNAL=http://ollama:11434 in .env.
      GRAPHRAG_OLLAMA_BASE_URL: ${GRAPHRAG_OLLAMA_BASE_URL_INTERNAL:-http://host.docker.internal:11434}
      # Cap CPU-thread fan-out so limits are actually respected.
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-2}
      TOKENIZERS_PARALLELISM: "false"
    extra_hosts: &host_gateway
      # On Linux, host.docker.internal doesn't exist unless mapped explicitly
      # (Docker Desktop provides it; plain dockerd does not).
      - "host.docker.internal:host-gateway"
    ports: ["8000:8000"]
    depends_on:
      neo4j: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: ["./data:/app/data"]
    deploy:
      resources:
        limits: { cpus: "${API_CPU_LIMIT:-2}", memory: "${API_MEM_LIMIT:-4g}" }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s   # first boot may download local models

  worker:
    build: { context: ., dockerfile: docker/Dockerfile }
    restart: unless-stopped
    command: ["arq", "graphrag.worker.WorkerSettings"]
    env_file: [.env]
    environment:
      <<: *backend_env
      GRAPHRAG_WORKER_CONCURRENCY: ${GRAPHRAG_WORKER_CONCURRENCY:-2}
    extra_hosts: *host_gateway
    # The shared image's HEALTHCHECK curls :8000/health, but the worker runs arq,
    # not the web server — inheriting it would flap to "unhealthy" forever. Check
    # what the worker actually depends on instead: a reachable Redis queue.
    healthcheck:
      test: ["CMD", "python", "-c", "import os,redis; redis.Redis.from_url(os.environ['GRAPHRAG_REDIS_URL']).ping()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      neo4j: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: ["./data:/app/data"]
    deploy:
      resources:
        limits: { cpus: "${WORKER_CPU_LIMIT:-2}", memory: "${WORKER_MEM_LIMIT:-4g}" }

  frontend:
    build: { context: ./frontend }
    restart: unless-stopped
    ports: ["5173:80"]
    depends_on:
      api: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: "${FRONTEND_CPU_LIMIT:-0.5}", memory: "${FRONTEND_MEM_LIMIT:-128m}" }

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["local"]
    ports: ["11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]
    deploy:
      resources:
        limits: { cpus: "${OLLAMA_CPU_LIMIT:-4}", memory: "${OLLAMA_MEM_LIMIT:-8g}" }

  # TLS termination + reverse proxy. This is the public entrypoint (80/443).
  # For a real deployment, remove the host `ports` from api/frontend above so
  # only the proxy is reachable from outside.
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}   # -> localhost or a domain to enable HTTPS
      TLS_EMAIL: ${TLS_EMAIL:-}
    ports: ["80:80", "443:443"]
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data           # persisted certs
      - caddy_config:/config
    depends_on:
      api: { condition: service_healthy }
      frontend: { condition: service_started }
    deploy:
      resources:
        limits: { cpus: "${PROXY_CPU_LIMIT:-0.5}", memory: "${PROXY_MEM_LIMIT:-128m}" }

volumes:
  neo4j_data:
  redis_data:
  ollama_data:
  caddy_data:
  caddy_config:
